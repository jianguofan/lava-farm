name: lava_farm
description: 局域网 3D 打印机群控桌面端 — 基于独立 MQTT Broker + Moonraker 协议
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  flutter_secure_storage: ^9.0.0
  mqtt_client: ^10.5.1
  typed_data: ^1.4.0
  file_selector: ^1.0.0
  image: ^4.0.0
  agent_core:
    path: packages/agent_core
  parse_3mf:  # 3MF 源模型解析（料盘/预览图/耗材用量）
    path: ../3mfLoad/dart
  # lava_device_sdk:  # 单机 SDK（共享协议层）
  #   path: ../lava_device_sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
